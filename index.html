<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搭伙晚餐 Hearth Table - 預訂系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1410; background-image: radial-gradient(#2d2420 0.5px, transparent 0.5px); background-size: 20px 20px; }
        .gold-gradient { background: linear-gradient(135deg, #d4a574 0%, #a67c52 100%); }
        .day-tab.active { border-color: #a67c52; background-color: rgba(166, 124, 82, 0.1); color: #a67c52; }
        .feature-badge { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="min-h-screen py-10 px-4">

    <div class="max-w-xl mx-auto">
        <div id="form-container" class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-white/20">
            <div class="gold-gradient p-8 text-white text-center">
                <h1 class="text-3xl font-bold tracking-[0.2em]">搭伙晚餐</h1>
                <p class="mt-1 opacity-90 font-light italic tracking-widest text-lg">Hearth Table</p>
                <div class="mt-4 inline-block px-4 py-2 feature-badge rounded-full text-xs tracking-widest font-bold border border-white/30">
                    ✨ 嚴選特級初榨橄欖油、無味精烹調
                </div>
            </div>

            <form id="orderForm" class="p-6 space-y-8">
                <div class="bg-gray-50 rounded-2xl p-6 space-y-6 border border-gray-100">
                    <h2 class="text-base font-black text-[#a67c52] tracking-widest border-l-4 border-[#a67c52] pl-3">基本聯絡資料</h2>
                    <div>
                        <label class="block text-sm font-black text-gray-700 mb-2">聯絡人 (社群名稱 + 帳號名稱)</label>
                        <input type="text" id="userName" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-[#a67c52]" placeholder="例如：Line 曼蒂">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-black text-gray-700 mb-2">取餐時段</label>
                            <select id="pickupTime" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white">
                                <option value="17:00-18:00">17:00 - 18:00</option>
                                <option value="17:30-18:30">17:30 - 18:30</option>
                                <option value="18:30-19:00">18:30 - 19:00</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-black text-gray-700 mb-2">取餐方式</label>
                            <select id="deliveryType" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white" onchange="handleDeliveryChange(this.value)">
                                <option value="自取">自取 (免運)</option>
                                <option value="外送(本人/家人)">外送-本人 ($50/日)</option>
                                <option value="外送(管理員)">外送-管理員 ($50/日)</option>
                            </select>
                        </div>
                    </div>
                    <div id="addressSection" class="hidden">
                        <label class="block text-sm font-black text-gray-700 mb-2">配送地址</label>
                        <input type="text" id="userAddress" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-[#a67c52]" placeholder="請輸入外送地址">
                    </div>
                    <div>
                        <label class="block text-sm font-black text-gray-700 mb-2">付款方式</label>
                        <select id="paymentMethod" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white">
                            <option value="轉帳">轉帳</option>
                            <option value="現金">現金</option>
                            <option value="管理員代付">管理員代付</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-black text-gray-700 mb-2">特別需求備註</label>
                        <textarea id="userNote" rows="2" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#a67c52] outline-none text-base resize-none" placeholder="如：不蔥、不辣..."></textarea>
                    </div>
                </div>

                <div class="space-y-4">
                    <div class="flex justify-between items-end">
                        <h2 class="text-base font-black text-[#a67c52] tracking-widest border-l-4 border-[#a67c52] pl-3">選擇餐點內容</h2>
                        <button type="button" onclick="resetCurrentDay()" class="text-xs font-bold text-gray-300 hover:text-red-400">↺ 清除本日重選</button>
                    </div>
                    <div class="flex border rounded-xl overflow-hidden bg-gray-50">
                        <button type="button" onclick="switchDay('Tue')" id="tab-Tue" class="day-tab active flex-1 py-4 text-center font-black">週二</button>
                        <button type="button" onclick="switchDay('Wed')" id="tab-Wed" class="day-tab flex-1 py-4 text-center font-black">週三</button>
                        <button type="button" onclick="switchDay('Thu')" id="tab-Thu" class="day-tab flex-1 py-4 text-center font-black">週四</button>
                        <button type="button" onclick="switchDay('Fri')" id="tab-Fri" class="day-tab flex-1 py-4 text-center font-black">週五</button>
                    </div>
                    <div id="menu-sections" class="space-y-8"></div>
                </div>

                <div class="pt-6 border-t border-gray-100 text-right">
                    <div id="fee-breakdown" class="text-xs font-bold text-gray-400 h-4 mb-2"></div>
                    <div class="flex justify-between items-center mb-6 bg-[#fcfaf8] p-6 rounded-2xl border border-[#a67c52]/20 shadow-inner">
                        <span class="font-black text-[#a67c52] text-base tracking-widest">訂單預估總額</span>
                        <span class="text-4xl font-black text-[#a67c52]">NT$<span id="display-total">0</span></span>
                    </div>
                    <button type="submit" id="submitBtn" class="gold-gradient w-full py-6 rounded-2xl text-white font-black text-xl shadow-xl tracking-[0.2em]">確認預訂</button>
                </div>
            </form>
        </div>

        <div id="success-container" class="hidden bg-white rounded-3xl shadow-2xl overflow-hidden border border-white/20">
            <div class="bg-green-50 p-8 text-center border-b border-green-100">
                <div class="w-16 h-16 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-lg">✓</div>
                <h2 class="text-2xl font-black text-gray-800 tracking-wider">訂單已成功送達！</h2>
                <p class="text-red-600 font-black mt-2 text-lg">📢 請務必「截圖」回傳至 Line</p>
            </div>
            <div class="p-6 space-y-6">
                <div id="summary-content" class="bg-gray-50 rounded-2xl p-6 text-left text-sm text-gray-700 whitespace-pre-line leading-relaxed shadow-inner border border-gray-100 font-medium"></div>
                <button onclick="location.reload()" class="w-full py-4 text-gray-400 font-black border-t mt-4">返回重新填寫</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwTf4gRhPlyKQiTOb0OVn66pxgGkjgodsgnVxmfjWiBSbq6nXtRoRuUkoN9A2lPaf-j/exec';
        
        const menus = {
            Tue: {
                side: [{n:"糯米椒炒豆乾",m:100,s:60},{n:"馬鈴薯炒肉絲",m:110,s:70},{n:"番茄炒蛋",m:100,s:60}],
                main: [{n:"果香翅小腿",m:180,s:100},{n:"薑煸小卷",m:250,s:150},{n:"蔥爆豬肉片",m:180,s:100},{n:"乾煎鱸魚",m:210,s:120},{n:"乾煎鮭魚",m:290,s:170}],
                soup: "味噌牡蠣湯"
            },
            Wed: {
                side: [{n:"蔬菜烘蛋",m:100,s:60},{n:"馬鈴薯炒肉絲",m:110,s:70},{n:"蔥爆豆乾",m:100,s:60}],
                main: [{n:"香菇肉燥",m:180,s:100},{n:"檸檬魚",m:230,s:130},{n:"蔥爆牛肉",m:240,s:140},{n:"大黃瓜燴蝦仁",m:180,s:100},{n:"乾煎鮭魚",m:290,s:170}],
                soup: "海帶芽貢丸湯"
            },
            Thu: {
                side: [{n:"蟹黃豆腐煲",m:120,s:70},{n:"蔥爆豆乾",m:100,s:60},{n:"番茄炒蛋",m:100,s:60}],
                main: [{n:"南瓜滷肉",m:220,s:130},{n:"茄汁鯖魚",m:200,s:120},{n:"蔥爆牛肉",m:240,s:140},{n:"大黃瓜燴蝦仁",m:180,s:100},{n:"乾煎鮭魚",m:290,s:170}],
                soup: "香菇雞湯"
            },
            Fri: {
                side: [{n:"金針菇炒豆包",m:100,s:60},{n:"蔥爆豆乾",m:100,s:60},{n:"番茄炒蛋",m:100,s:60}],
                main: [{n:"白醬嫩雞",m:200,s:120},{n:"絲瓜鮮蚵",m:190,s:110},{n:"蔥爆豬肉片",m:180,s:100},{n:"紅燒鱸魚",m:210,s:120},{n:"乾煎鮭魚",m:290,s:170}],
                soup: "香根牛肉湯"
            }
        };

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        let allDaySelections = { Tue: {}, Wed: {}, Thu: {}, Fri: {} };
        let currentDay = 'Tue';

        function handleDeliveryChange(val) {
            const section = document.getElementById('addressSection');
            if(val.includes('外送')) section.classList.remove('hidden');
            else { section.classList.add('hidden'); document.getElementById('userAddress').value = ''; }
            updateTotal();
        }

        function switchDay(day) {
            currentDay = day;
            document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${day}`).classList.add('active');
            renderMenu();
        }

        function resetCurrentDay() {
            if(confirm(`確定要清除本日的所有選擇嗎？`)) {
                allDaySelections[currentDay] = {};
                renderMenu();
                updateTotal();
            }
        }

        function renderMenu() {
            const container = document.getElementById('menu-sections');
            const data = menus[currentDay];
            const sel = allDaySelections[currentDay];
            let html = '';

            html += `<div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm space-y-3">
                <h3 class="text-sm font-black text-gray-500 tracking-widest">● 基礎餐(內容：時蔬+青花菜+當日副菜)</h3>
                <div class="grid grid-cols-2 gap-2">
                    <label class="cursor-pointer"><input type="radio" name="baseSize" value="M" ${sel.baseSize==='M'?'checked':''} onchange="updateSel('baseSize','M')" class="peer sr-only"><div class="py-3 text-center border-2 rounded-xl font-black text-gray-400 peer-checked:border-[#a67c52] peer-checked:bg-[#a67c52]/5 peer-checked:text-[#a67c52]">大份 M ($320)</div></label>
                    <label class="cursor-pointer"><input type="radio" name="baseSize" value="S" ${sel.baseSize==='S'?'checked':''} onchange="updateSel('baseSize','S')" class="peer sr-only"><div class="py-3 text-center border-2 rounded-xl font-black text-gray-400 peer-checked:border-[#a67c52] peer-checked:bg-[#a67c52]/5 peer-checked:text-[#a67c52]">小份 S ($200)</div></label>
                    <label class="cursor-pointer"><input type="radio" name="baseSize" value="NONE" ${sel.baseSize==='NONE'?'checked':''} onchange="updateSel('baseSize','NONE')" class="peer sr-only"><div class="py-3 text-center border-2 rounded-xl font-black text-gray-400 peer-checked:border-red-400 peer-checked:bg-red-50/50 peer-checked:text-red-500">純加點 ($50)</div></label>
                    <label class="cursor-pointer"><input type="radio" name="baseSize" value="" ${!sel.baseSize?'checked':''} onchange="updateSel('baseSize','')" class="peer sr-only"><div class="py-3 text-center border-2 rounded-xl font-black text-gray-300 peer-checked:border-gray-400 peer-checked:bg-gray-100 peer-checked:text-gray-600">本日不預訂</div></label>
                </div>
            </div>`;

            if (sel.baseSize) {
                if (sel.baseSize !== 'NONE') {
                    html += `<div class="space-y-3"><h3 class="text-sm font-black text-gray-500 tracking-widest">● 選擇基礎餐副菜</h3>`;
                    data.side.forEach((opt, idx) => {
                        html += `<label class="block cursor-pointer"><input type="radio" name="sideChoice" value="${opt.n}" ${sel.sideChoice===opt.n?'checked':''} onchange="updateSel('sideChoice','${opt.n}')" class="peer sr-only"><div class="p-4 bg-white border border-gray-100 rounded-2xl peer-checked:border-[#a67c52] font-black text-gray-700 flex justify-between"><span>[${alphabet[idx]}] ${opt.n}</span><span class="text-gray-300 font-medium">基礎餐含</span></div></label>`;
                    });
                    html += `</div>`;
                }

                html += `<div class="space-y-4"><h3 class="text-sm font-black text-gray-500 tracking-widest">● 加點主菜副菜及湯品</h3>`;
                let addonLetterIdx = 0;
                data.side.forEach((s, idx) => { html += renderAddonItem(`side-${idx}`, `[${alphabet[addonLetterIdx++]}] 副菜：${s.n}`, s.m, s.s); });
                data.main.forEach((m, idx) => { html += renderAddonItem(`main-${idx}`, `[${alphabet[addonLetterIdx++]}] 主菜：${m.n}`, m.m, m.s); });
                const soupQty = sel['soup'] || 0;
                html += `<div class="p-4 bg-white border rounded-2xl flex justify-between items-center shadow-sm">
                    <div><div class="font-black text-gray-700">[${alphabet[addonLetterIdx++]}] 湯品：${data.soup}</div><div class="text-xs text-gray-400">加點價 $100</div></div>
                    <div class="flex gap-2"><button type="button" onclick="changeQty('soup',-1)" class="w-8 h-8 bg-gray-100 rounded-lg">－</button><span class="w-6 text-center font-bold">${soupQty}</span><button type="button" onclick="changeQty('soup',1)" class="w-8 h-8 bg-orange-50 text-[#a67c52] rounded-lg">＋</button></div>
                </div>`;
                html += `</div>`;
            }
            container.innerHTML = html;
        }

        function renderAddonItem(id, name, pM, pS) {
            const valM = allDaySelections[currentDay][id+'-M'] || 0;
            const valS = allDaySelections[currentDay][id+'-S'] || 0;
            return `<div class="p-4 bg-white border border-gray-100 rounded-2xl shadow-sm flex flex-col gap-3">
                <div class="font-black text-gray-700">${name}</div>
                <div class="flex gap-4">
                    <div class="flex-1 flex justify-between items-center bg-gray-50 p-2 rounded-xl border">
                        <span class="text-xs font-black text-gray-400">M ($${pM})</span>
                        <div class="flex items-center"><button type="button" onclick="changeQty('${id}-M',-1)" class="w-6 h-6 text-gray-300">－</button><span class="w-6 text-center font-bold text-sm">${valM}</span><button type="button" onclick="changeQty('${id}-M',1)" class="w-6 h-6 text-[#a67c52]">＋</button></div>
                    </div>
                    <div class="flex-1 flex justify-between items-center bg-gray-50 p-2 rounded-xl border">
                        <span class="text-xs font-black text-gray-400">S ($${pS})</span>
                        <div class="flex items-center"><button type="button" onclick="changeQty('${id}-S',-1)" class="w-6 h-6 text-gray-300">－</button><span class="w-6 text-center font-bold text-sm">${valS}</span><button type="button" onclick="changeQty('${id}-S',1)" class="w-6 h-6 text-[#a67c52]">＋</button></div>
                    </div>
                </div>
            </div>`;
        }

        function updateSel(key, val) { 
            if (val === "") allDaySelections[currentDay] = {}; 
            else allDaySelections[currentDay][key] = val; 
            renderMenu(); 
            updateTotal(); 
        }

        function changeQty(id, amt) { 
            allDaySelections[currentDay][id] = Math.max(0, (allDaySelections[currentDay][id] || 0) + amt); 
            renderMenu(); 
            updateTotal(); 
        }

        function updateTotal() {
            let total = 0; let activeDays = 0;
            const delivery = document.getElementById('deliveryType').value;
            ['Tue', 'Wed', 'Thu', 'Fri'].forEach(day => {
                const sel = allDaySelections[day]; if (!sel.baseSize) return;
                activeDays++;
                if (sel.baseSize === 'M') total += 320; else if (sel.baseSize === 'S') total += 200; else if (sel.baseSize === 'NONE') total += 50;
                Object.keys(sel).forEach(key => {
                    const qty = parseInt(sel[key]) || 0; if (qty <= 0) return;
                    const menuData = menus[day];
                    if (key.startsWith('main-')) { const p = key.split('-'); total += qty * (p[2] === 'M' ? menuData.main[p[1]].m : menuData.main[p[1]].s); }
                    else if (key.startsWith('side-')) { const p = key.split('-'); total += qty * (p[2] === 'M' ? menuData.side[p[1]].m : menuData.side[p[1]].s); }
                    else if (key === 'soup') total += qty * 100;
                });
            });
            const dFee = delivery.includes('外送') ? (activeDays * 50) : 0;
            document.getElementById('display-total').innerText = (total + dFee).toLocaleString();
            document.getElementById('fee-breakdown').innerText = dFee > 0 ? `(含外送費 $${dFee}，共 ${activeDays} 天)` : "";
        }

        function generateDetailText() {
            let d = [];
            const pickupTime = document.getElementById('pickupTime').value;
            const deliveryType = document.getElementById('deliveryType').value;
            const userAddress = document.getElementById('userAddress').value;
            const paymentMethod = document.getElementById('paymentMethod').value;

            d.push(`【取餐資訊】`);
            d.push(` ▫️ 取餐時段：${pickupTime}`);
            d.push(` ▫️ 取餐方式：${deliveryType}`);
            if (deliveryType.includes('外送')) d.push(` ▫️ 配送地址：${userAddress || '未填寫'}`);
            d.push(` ▫️ 付款方式：${paymentMethod}`);
            d.push(`---------------------------`);
            d.push(``);

            ['Tue', 'Wed', 'Thu', 'Fri'].forEach(day => {
                const sel = allDaySelections[day]; if (!sel.baseSize) return;
                const menuData = menus[day];
                d.push(`● ${{Tue:'週二', Wed:'週三', Thu:'週四', Fri:'週五'}[day]}`);
                if (sel.baseSize === 'NONE') d.push(` ▫️ 純加點 (基本費 $50)`);
                else {
                    const baseSide = sel.sideChoice || '未選';
                    const sideIdx = menuData.side.findIndex(s => s.n === baseSide);
                    d.push(` ▫️ 基礎餐(${sel.baseSize}): ${sideIdx!==-1?'['+alphabet[sideIdx]+'] ':''}${baseSide}`);
                }
                let lIdx = 0;
                menuData.side.forEach((s, i) => {
                    const qM = parseInt(sel[`side-${i}-M`]) || 0, qS = parseInt(sel[`side-${i}-S`]) || 0;
                    if(qM > 0) d.push(` ▫️ [${alphabet[lIdx]}] 加點-${s.n} (M) x${qM}`);
                    if(qS > 0) d.push(` ▫️ [${alphabet[lIdx]}] 加點-${s.n} (S) x${qS}`);
                    lIdx++;
                });
                menuData.main.forEach((m, i) => {
                    const qM = parseInt(sel[`main-${i}-M`]) || 0, qS = parseInt(sel[`main-${i}-S`]) || 0;
                    if(qM > 0) d.push(` ▫️ [${alphabet[lIdx]}] 加點-${m.n} (M) x${qM}`);
                    if(qS > 0) d.push(` ▫️ [${alphabet[lIdx]}] 加點-${m.n} (S) x${qS}`);
                    lIdx++;
                });
                const sQ = parseInt(sel['soup']) || 0;
                if(sQ > 0) d.push(` ▫️ [${alphabet[lIdx]}] 加點-湯品(${menuData.soup}) x${sQ}`);
                d.push("");
            });
            return d.join('\n');
        }

        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const detailText = generateDetailText();
            if(!detailText) return alert('請先選餐！');
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "傳送中...";
            const params = new URLSearchParams();
            params.append('date', new Date().toLocaleString('zh-TW'));
            params.append('user', document.getElementById('userName').value);
            params.append('time', document.getElementById('pickupTime').value);
            params.append('type', document.getElementById('deliveryType').value);
            params.append('address', document.getElementById('userAddress').value || "自取");
            params.append('payment', document.getElementById('paymentMethod').value);
            params.append('detail', detailText);
            params.append('amount', document.getElementById('display-total').innerText.replace(/,/g, ''));
            params.append('note', document.getElementById('userNote').value || "無");
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params });
                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-container').classList.remove('hidden');
                document.getElementById('summary-content').innerText = `【訂購摘要】\n聯絡人：${params.get('user')}\n總額：NT$${params.get('amount')}\n\n${detailText}`;
                window.scrollTo(0, 0);
            } catch (err) { alert('發送失敗，請截圖後聯繫我們！'); btn.disabled = false; btn.innerText = "確認預訂"; }
        });
        switchDay('Tue');
    </script>
</body>
</html>

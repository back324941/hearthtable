<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>搭伙晚餐 | Hearth Table</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #1a1410; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow-x: hidden; -webkit-tap-highlight-color: transparent; 
            font-size: 20px; user-select: none;
        }
        .gold-gradient { background: linear-gradient(135deg, #d4a574 0%, #a67c52 100%); }
        .day-tab.active { border-color: #a67c52; background-color: rgba(166, 124, 82, 0.2); color: #a67c52; }
        .clickable:active { transform: scale(0.96); opacity: 0.8; }
        .item-selected { border-color: #a67c52 !important; background-color: #fff9f3 !important; color: #a67c52 !important; }
        
        .v-qty-container { 
            display: flex; flex-direction: column; align-items: center; 
            background: #fff; border: 4px solid #e5e7eb; border-radius: 1.5rem; 
            overflow: hidden; width: 85px; 
        }
        .v-qty-btn { 
            width: 100%; height: 55px; display: flex; align-items: center; justify-content: center; 
            font-size: 32px; font-weight: 900; cursor: pointer;
        }
        .btn-plus { background-color: #a67c52; color: white; }
        .btn-minus { background-color: #f3f4f6; color: #9ca3af; }
        
        #cart-drawer { transition: transform 0.3s ease; transform: translateX(100%); }
        #cart-drawer.open { transform: translateX(0); }
    </style>
</head>
<body class="min-h-screen py-4 px-3 pb-24 text-gray-900">

    <div id="side-total-btn" class="fixed top-20 right-0 z-40">
        <div onclick="toggleCart(true)" class="w-20 py-8 gold-gradient border-y border-l border-white/30 flex flex-col items-center gap-2 rounded-l-[2rem] shadow-2xl active:scale-90 transition-all">
            <span class="text-white font-black text-2xl" id="cart-total">0</span>
        </div>
    </div>

    <div id="cart-overlay" onclick="toggleCart(false)" class="fixed inset-0 bg-black/70 z-50 hidden"></div>
    <div id="cart-drawer" class="fixed top-0 right-0 h-full w-[90%] max-w-[420px] bg-white z-50 shadow-2xl flex flex-col">
        <div class="flex justify-between items-center p-6 border-b-4 bg-gray-50">
            <h2 class="text-3xl font-black italic">Hearth Table 明細</h2>
            <div onclick="toggleCart(false)" class="text-4xl p-2 text-gray-300">✕</div>
        </div>
        <div id="cart-items-list" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
        <div class="p-8 bg-gray-100 border-t-8 space-y-4">
            <button onclick="clearAll()" class="w-full py-3 text-red-500 font-black text-lg bg-white border-2 border-red-100 rounded-2xl">⚠️ 全部清空</button>
            <div class="flex justify-between items-center">
                <span class="text-xl font-bold text-gray-500">總計</span>
                <span class="text-4xl font-black text-[#a67c52]">NT$ <span id="drawer-total">0</span></span>
            </div>
            <div onclick="toggleCart(false)" class="w-full py-6 gold-gradient rounded-3xl text-center text-white font-black text-2xl shadow-lg">返回挑選</div>
        </div>
    </div>

    <div class="max-w-xl mx-auto">
        <div id="form-container" class="bg-white rounded-[3rem] shadow-2xl overflow-hidden">
            <div class="gold-gradient p-10 text-white text-center">
                <h1 class="text-5xl font-black tracking-tighter italic">搭伙晚餐</h1>
                <p class="text-xl mt-2 font-bold tracking-widest">Hearth Table</p>
                <p class="text-sm mt-4 text-yellow-200 font-bold tracking-widest opacity-80">✨ 嚴選初榨橄欖油．無味精．食得安心 ✨</p>
            </div>

            <div class="p-6 space-y-10">
                <div class="space-y-4">
                    <input type="text" id="userName" class="w-full px-6 py-5 rounded-2xl border-4 border-gray-100 text-2xl font-black bg-gray-50 outline-none focus:border-[#a67c52]" placeholder="訂購人姓名">
                    <div class="grid grid-cols-2 gap-4">
                        <select id="deliveryType" class="px-2 py-5 rounded-2xl border-4 border-gray-100 font-black text-xl text-center" onchange="toggleDelivery(this.value)">
                            <option value="自取">店內自取</option>
                            <option value="外送">外送(+$50/日)(3公里內)</option>
                        </select>
                        <select id="pickupTime" class="px-2 py-5 rounded-2xl border-4 border-gray-100 font-black text-xl text-center">
                            <option value="17:00-18:00">17:00-18:00</option>
                            <option value="18:00-19:00">18:00-19:00</option>
                        </select>
                    </div>
                    <div id="addressBox" class="hidden">
                        <input type="text" id="address" class="w-full px-6 py-5 rounded-2xl border-4 border-orange-100 text-xl font-bold bg-orange-50 outline-none" placeholder="完整外送地址">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div onclick="setPay('現金')" id="pay-現金" class="py-4 border-4 rounded-2xl text-center font-black text-lg clickable item-selected">現金支付</div>
                        <div onclick="setPay('LinePay')" id="pay-LinePay" class="py-4 border-4 rounded-2xl text-center font-black text-lg clickable border-gray-100 text-gray-300">LinePay 轉帳</div>
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="flex items-center justify-between px-2">
                        <span class="text-lg font-black text-gray-400">STEP 1. 選擇預訂日期</span>
                        <button onclick="clearDay()" class="text-sm font-black text-red-500 border-2 border-red-100 px-4 py-1 rounded-full">✕ 重設今日</button>
                    </div>
                    <div class="flex border-[4px] rounded-[2rem] overflow-hidden bg-gray-100 border-gray-100">
                        <div onclick="switchDay('Tue')" id="tab-Tue" class="day-tab active flex-1 py-5 text-center font-black text-3xl clickable">二</div>
                        <div onclick="switchDay('Wed')" id="tab-Wed" class="day-tab flex-1 py-5 text-center font-black text-3xl clickable">三</div>
                        <div onclick="switchDay('Thu')" id="tab-Thu" class="day-tab flex-1 py-5 text-center font-black text-3xl clickable">四</div>
                        <div onclick="switchDay('Fri')" id="tab-Fri" class="day-tab flex-1 py-5 text-center font-black text-3xl clickable">五</div>
                    </div>
                </div>

                <div id="menu-content" class="space-y-12"></div>

                <div class="pt-8 space-y-6">
                    <div onclick="goToNextDay()" id="nextDayBtn" class="w-full py-6 bg-gray-800 text-white rounded-[2rem] text-center font-black text-2xl clickable shadow-lg">下一個日期 ➜</div>
                    <div onclick="submitOrder()" class="gold-gradient w-full py-8 rounded-[2.5rem] text-center text-white font-black text-3xl shadow-xl clickable">確認預訂，產出截圖 ➔</div>
                </div>
            </div>
        </div>

        <div id="success-container" class="hidden bg-white rounded-[3rem] shadow-2xl p-8 text-center border-[8px] border-orange-100">
            <div class="mb-6">
                <h2 class="text-4xl font-black text-gray-800 italic">Hearth Table</h2>
                <p class="text-gray-400 font-bold">訂單明細確認</p>
            </div>
            <div id="summary-content" class="text-left text-xl font-black whitespace-pre-line leading-relaxed border-4 p-8 rounded-[2rem] bg-gray-50 mb-8 border-gray-100"></div>
            <p class="text-red-500 font-black mb-4">📸 請截圖此畫面並回傳 Line 群組</p>
            <div onclick="location.reload()" class="text-gray-300 underline text-lg py-4">返回修改</div>
        </div>
    </div>

    <script>
        const menus = {
            Tue: { main: [{i:"A",n:"果香翅小腿",m:180,s:100},{i:"B",n:"薑煸小卷",m:250,s:150},{i:"C",n:"蔥爆豬肉片",m:180,s:100},{i:"D",n:"乾煎鱸魚",m:210,s:120},{i:"E",n:"乾煎鮭魚",m:290,s:170}], side: [{i:"F",n:"糯米椒炒豆乾",m:100,s:60},{i:"G",n:"馬鈴薯炒肉絲",m:110,s:70},{i:"H",n:"番茄炒蛋",m:100,s:60}], soup: {n:"味噌牡蠣湯", p:100} },
            Wed: { main: [{i:"A",n:"香菇肉燥",m:180,s:100},{i:"B",n:"檸檬魚",m:230,s:130},{i:"C",n:"蔥爆牛肉",m:240,s:140},{i:"D",n:"大黃瓜透過",m:180,s:100},{i:"E",n:"乾煎鮭魚",m:290,s:170}], side: [{i:"F",n:"蔬菜烘蛋",m:120,s:60},{i:"G",n:"馬鈴薯炒肉絲",m:110,s:70},{i:"H",n:"蔥爆豆乾",m:100,s:60}], soup: {n:"海帶芽貢丸湯", p:100} },
            Thu: { main: [{i:"A",n:"南瓜滷肉",m:220,s:130},{i:"B",n:"茄汁鯖魚",m:200,s:120},{i:"C",n:"蔥爆牛肉",m:240,s:140},{i:"D",n:"大黃瓜燴蝦仁",m:180,s:100},{i:"E",n:"乾煎鮭魚",m:290,s:170}], side: [{i:"F",n:"蟹黃豆腐煲",m:120,s:70},{i:"G",n:"蔥爆豆乾",m:100,s:60},{i:"H",n:"番茄炒蛋",m:100,s:60}], soup: {n:"香菇雞湯", p:120} },
            Fri: { main: [{i:"A",n:"白醬嫩雞",m:200,s:120},{i:"B",n:"絲瓜鮮蚵",m:190,s:110},{i:"C",n:"蔥爆豬肉片",m:180,s:100},{i:"D",n:"紅燒鱸魚",m:210,s:120},{i:"E",n:"乾煎鮭魚",m:290,s:170}], side: [{i:"F",n:"金針菇炒豆包",m:100,s:60},{i:"G",n:"蔥爆豆乾",m:100,s:60},{i:"H",n:"番茄炒蛋",m:100,s:60}], soup: {n:"香根牛肉湯", p:120} }
        };

        let selections = { Tue: {}, Wed: {}, Thu: {}, Fri: {} };
        let currentDay = 'Tue';
        let paymentMethod = '現金';

        // 核心邏輯：判斷某一天是否有有效的加點品項
        function hasAddons(day) {
            const s = selections[day];
            return Object.keys(s).some(k => k.includes('addon') && s[k] > 0);
        }

        function toggleCart(open) {
            const drawer = document.getElementById('cart-drawer');
            const overlay = document.getElementById('cart-overlay');
            if(open) { updateDrawer(); overlay.classList.remove('hidden'); setTimeout(() => drawer.classList.add('open'), 10); }
            else { drawer.classList.remove('open'); setTimeout(() => overlay.classList.add('hidden'), 300); }
        }

        function toggleDelivery(val) { document.getElementById('addressBox').classList.toggle('hidden', val==='自取'); updateTotal(); }

        function setPay(method) {
            paymentMethod = method;
            document.getElementById('pay-現金').className = `py-4 border-4 rounded-2xl text-center font-black text-lg clickable ${method==='現金'?'item-selected':'border-gray-100 text-gray-300'}`;
            document.getElementById('pay-LinePay').className = `py-4 border-4 rounded-2xl text-center font-black text-lg clickable ${method==='LinePay'?'item-selected':'border-gray-100 text-gray-300'}`;
        }

        function clearDay() { if(confirm(`重設週${{Tue:'二',Wed:'三',Thu:'四',Fri:'五'}[currentDay]}？`)) { selections[currentDay] = {}; renderMenu(); updateTotal(); }}
        function clearAll() { if(confirm("全部清空？")) { selections = { Tue: {}, Wed: {}, Thu: {}, Fri: {} }; toggleCart(false); renderMenu(); updateTotal(); }}

        function switchDay(day) { 
            currentDay = day; 
            document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${day}`).classList.add('active');
            renderMenu(); 
        }

        function goToNextDay() {
            const days = ['Tue','Wed','Thu','Fri'];
            const idx = days.indexOf(currentDay);
            if(idx < 3) switchDay(days[idx+1]);
            window.scrollTo({top: 280, behavior: 'smooth'});
        }

        function updateSel(k, v) { selections[currentDay][k] = v; renderMenu(); updateTotal(); }
        function changeQty(id, amt) { selections[currentDay][id] = Math.max(0, (selections[currentDay][id] || 0) + amt); renderMenu(); updateTotal(); }

        function renderMenu() {
            const sel = selections[currentDay];
            const data = menus[currentDay];
            let html = `<div class="grid grid-cols-2 gap-4">
                <div onclick="updateSel('type','M')" class="p-6 border-4 rounded-[2rem] font-black text-center text-2xl clickable ${sel.type==='M'?'item-selected':'border-gray-100 text-gray-300'}">M 套餐 $500</div>
                <div onclick="updateSel('type','S')" class="p-6 border-4 rounded-[2rem] font-black text-center text-2xl clickable ${sel.type==='S'?'item-selected':'border-gray-100 text-gray-300'}">S 套餐 $300</div>
            </div>
            <div onclick="updateSel('type','NONE')" class="py-2 text-center font-black text-lg ${sel.type==='NONE'?'text-[#a67c52]':'text-gray-300'} underline clickable">➔ 自由單點模式</div>`;

            if (sel.type === 'M' || sel.type === 'S') {
                const limit = (sel.type === 'M') ? 180 : 100;
                html += `<div class="space-y-4 pt-6 border-t-4 border-gray-50"><h3 class="text-xl font-black text-[#a67c52]">STEP 2. 套餐主菜</h3>`;
                data.main.forEach((m, i) => {
                    const extra = Math.max(0, (sel.type==='M'?m.m:m.s) - limit);
                    html += `<div onclick="updateSel('mainIdx',${i})" class="p-6 border-4 rounded-2xl font-black text-2xl flex justify-between items-center clickable ${sel.mainIdx===i?'item-selected':'border-gray-50 bg-gray-50/50'}"><span>${m.i}. ${m.n}</span> ${extra>0?`<span class="text-red-500 text-lg">+$${extra}</span>`:''}</div>`;
                });
                html += `</div><div class="space-y-4 pt-6"><h3 class="text-xl font-black text-[#a67c52]">STEP 3. 套餐副菜</h3>`;
                data.side.forEach((s, i) => {
                    html += `<div onclick="updateSel('sideIdx',${i})" class="p-6 border-4 rounded-2xl font-black text-2xl clickable ${sel.sideIdx===i?'item-selected':'border-gray-50 bg-gray-50/50'}">${s.i}. ${s.n}</div>`;
                });
                html += `<div onclick="updateSel('sideIdx','v')" class="p-6 border-4 rounded-2xl font-black text-2xl text-green-600 clickable ${sel.sideIdx==='v'?'item-selected border-green-500':'border-green-50 bg-green-50/50'}">✨ 時蔬量加大 (不選副菜)</div></div>`;
            }

            if(sel.type) {
                html += `<div class="pt-10 border-t-4 border-gray-100 space-y-8"><h3 class="text-2xl font-black text-[#a67c52] italic uppercase">加購/單點品項</h3>`;
                data.main.forEach((m, i) => html += renderAddon(`addonM-${i}`, m.i, m.n, m.m, m.s));
                data.side.forEach((s, i) => html += renderAddon(`addonS-${i}`, s.i, s.n, s.m, s.s));
                const sQty = sel['addonSoup'] || 0;
                html += `<div class="p-6 bg-white rounded-[2.5rem] flex justify-between items-center border-4 border-gray-100 shadow-md">
                    <div class="font-black text-2xl text-gray-800">🍲 ${data.soup.n}<br><span class="text-[#a67c52] mt-2 block">$${data.soup.p}</span></div>
                    <div class="v-qty-container">
                        <div onclick="changeQty('addonSoup',1)" class="v-qty-btn btn-plus">＋</div>
                        <div class="text-3xl font-black py-2">${sQty}</div>
                        <div onclick="changeQty('addonSoup',-1)" class="v-qty-btn btn-minus">－</div>
                    </div>
                </div></div>`;
            }
            document.getElementById('menu-content').innerHTML = html;
        }

        function renderAddon(id, letter, name, pM, pS) {
            const sel = selections[currentDay];
            return `<div class="p-6 bg-white rounded-[2.5rem] space-y-6 border-4 border-gray-100 shadow-lg">
                <div class="font-black text-2xl text-gray-800">${letter}. ${name}</div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-2xl flex justify-between items-center">
                        <div class="font-black text-lg text-gray-400">大 $${pM}</div>
                        <div class="v-qty-container" style="width:75px">
                            <div onclick="changeQty('${id}-M',1)" class="v-qty-btn btn-plus" style="height:45px">＋</div>
                            <div class="text-2xl font-black">${sel[id+'-M']||0}</div>
                            <div onclick="changeQty('${id}-M',-1)" class="v-qty-btn btn-minus" style="height:45px">－</div>
                        </div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl flex justify-between items-center">
                        <div class="font-black text-lg text-gray-400">小 $${pS}</div>
                        <div class="v-qty-container" style="width:75px">
                            <div onclick="changeQty('${id}-S',1)" class="v-qty-btn btn-plus" style="height:45px">＋</div>
                            <div class="text-2xl font-black">${sel[id+'-S']||0}</div>
                            <div onclick="changeQty('${id}-S',-1)" class="v-qty-btn btn-minus" style="height:45px">－</div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        function updateTotal() {
            let total = 0; let activeDays = 0;
            const delivery = document.getElementById('deliveryType').value;
            for (let day in selections) {
                const s = selections[day]; if (!s.type) continue;
                
                // 防誤觸：如果是單點模式但完全沒選菜，則不計費也不計天數
                if (s.type === 'NONE' && !hasAddons(day)) continue;

                activeDays++;
                let dayTotal = 0;
                if (s.type === 'M') dayTotal += 500 + Math.max(0, (menus[day].main[s.mainIdx||0]?.m || 0) - 180);
                else if (s.type === 'S') dayTotal += 300 + Math.max(0, (menus[day].main[s.mainIdx||0]?.s || 0) - 100);
                else if (s.type === 'NONE') dayTotal += 50; 
                
                Object.keys(s).forEach(k => { if (s[k]>0 && k.includes('addon')) {
                    const p = k.split('-');
                    if (k.startsWith('addonM-')) dayTotal += s[k] * (p[2]==='M' ? menus[day].main[p[1]].m : menus[day].main[p[1]].s);
                    if (k.startsWith('addonS-')) dayTotal += s[k] * (p[2]==='M' ? menus[day].side[p[1]].m : menus[day].side[p[1]].s);
                    if (k === 'addonSoup') dayTotal += s[k] * menus[day].soup.p;
                }});
                total += dayTotal;
            }
            if (delivery !== '自取') total += activeDays * 50;
            document.getElementById('cart-total').innerText = total.toLocaleString();
            document.getElementById('drawer-total').innerText = total.toLocaleString();
        }

        function updateDrawer() {
            let list = [];
            for (let day in selections) {
                const s = selections[day]; if (!s.type) continue;
                if (s.type === 'NONE' && !hasAddons(day)) continue; // 抽屜預覽也排除空單點

                const dName = {Tue:'週二',Wed:'週三',Thu:'週四',Fri:'週五'}[day];
                let items = [];
                if(s.type === 'NONE') items.push(`<li class="text-red-500 italic">⚠️ 自由單點</li>`);
                else {
                    items.push(`<li>🍱 ${s.type}套餐：${menus[day].main[s.mainIdx||0].n}</li>`);
                    items.push(`<li>🥗 副菜：${s.sideIdx==='v'?'時蔬量加倍':menus[day].side[s.sideIdx||0].n}</li>`);
                }
                Object.keys(s).forEach(k => { if (s[k]>0 && k.includes('addon')) {
                    const p = k.split('-');
                    if (k.startsWith('addonM-')) items.push(`<li>➕ ${menus[day].main[p[1]].n}(${p[2]}) x${s[k]}</li>`);
                    if (k.startsWith('addonS-')) items.push(`<li>➕ ${menus[day].side[p[1]].n}(${p[2]}) x${s[k]}</li>`);
                    if (k === 'addonSoup') items.push(`<li>➕ ${menus[day].soup.n} x${s[k]}</li>`);
                }});
                list.push(`<div class="p-6 bg-orange-50 rounded-[1.5rem] border-l-8 border-[#a67c52]">
                    <div class="text-[#a67c52] font-black text-xl mb-2">${dName}</div>
                    <ul class="text-xl font-bold text-gray-700 space-y-2">${items.join('')}</ul>
                </div>`);
            }
            document.getElementById('cart-items-list').innerHTML = list.join('') || '<div class="text-center py-20 text-gray-300 font-black">無選購內容</div>';
        }

        function submitOrder() {
            const name = document.getElementById('userName').value;
            const delType = document.getElementById('deliveryType').value;
            const address = document.getElementById('address').value;
            if(!name) { alert("請填寫姓名"); return; }
            if(delType === '外送' && !address) { alert("請填寫外送地址"); return; }

            let d = [`【Hearth Table 預訂清單】`,`訂購人：${name}`,`配送：${delType}`,`時間：${document.getElementById('pickupTime').value}`];
            if(delType === '外送') d.push(`地址：${address}`);
            d.push(`付款：${paymentMethod}`,`---------------------------`);
            
            let hasValidData = false;
            for (let day in selections) {
                const s = selections[day]; if (!s.type) continue;
                if (s.type === 'NONE' && !hasAddons(day)) continue; // 結帳排除空單點

                hasValidData = true;
                d.push(`● ${{Tue:'週二',Wed:'週三',Thu:'週四',Fri:'週五'}[day]}：`);
                if(s.type === 'NONE') d.push(`  ▫️ 模式：自由單點 ($50服務費)`);
                else d.push(`  ▫️ 套餐：${s.type}套餐 (${menus[day].main[s.mainIdx||0].n})`);
                Object.keys(s).forEach(k => { if (s[k]>0 && k.includes('addon')) {
                    const p = k.split('-');
                    if (k.startsWith('addonM-')) d.push(`  ➕ [單點] ${menus[day].main[p[1]].n}(${p[2]}) x${s[k]}`);
                    if (k.startsWith('addonS-')) d.push(`  ➕ [單點] ${menus[day].side[p[1]].n}(${p[2]}) x${s[k]}`);
                    if (k === 'addonSoup') d.push(`  ➕ [加購] ${menus[day].soup.n} x${s[k]}`);
                }});
            }

            if(!hasValidData) { alert("請先選購餐點再提交！"); return; }

            d.push(`---------------------------`,`應付總計：NT$ ${document.getElementById('cart-total').innerText}`);
            
            // 隱藏圓形按鈕
            document.getElementById('side-total-btn').style.display = 'none';
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('success-container').classList.remove('hidden');
            document.getElementById('summary-content').innerText = d.join('\n');
            window.scrollTo(0, 0);
        }
        switchDay('Tue');
    </script>
</body>
</html>
